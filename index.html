<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Software - Khushal Bhavani</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fdfdfd; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    .lang-switcher { margin-bottom: 15px; display: flex; gap: 10px; z-index: 10; }
    .lang-btn { padding: 8px 15px; border: 2px solid #b31d1d; background: white; color: #b31d1d; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .lang-btn.active { background: #b31d1d; color: white; }
    .app-container { width: 100%; max-width: 500px; background: #fff; border: 2px solid #b31d1d; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
    .table-section { position: relative; flex: 1.4; }
    .watermark-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-25deg); text-align: center; pointer-events: none; z-index: 0; width: 100%; }
    .watermark-text { font-size: 55px; font-weight: 900; color: rgba(179, 29, 29, 0.18); line-height: 1; text-transform: uppercase; letter-spacing: 1px; }
    
    @media print {
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        .lang-switcher, #actionButtons, .row-controls, .charge-selector-box { display: none !important; }
        .app-container { border: none; box-shadow: none; width: 100%; max-width: 100%; }
        .main-content { display: flex !important; gap: 20px; }
    }

    .download-mode { max-width: 650px !important; width: 650px !important; }
    .download-mode .main-content { display: flex !important; gap: 15px; padding: 15px; align-items: flex-start; }
    .download-mode .summary-section { flex: 0.8; }
    .download-mode .charge-selector-box { display: none !important; }
    
    .market-section, .main-content { position: relative; z-index: 1; }
    .market-section { padding: 12px; background: rgba(249, 249, 249, 0.7); border-bottom: 1px solid #eee; }
    .input-group { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .input-group label { font-weight: bold; min-width: 90px; font-size: 15px; }
    
    #marketName, #farmerName { width: 100%; padding: 10px 8px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; resize: none; background: transparent; line-height: 1.5; overflow: hidden; }
    #dateInput { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 8px; background: transparent; font-weight: bold; }
    #formattedDateDisplay { display: none; padding: 5px; font-size: 17px; font-weight: 700; color: #000; }
    
    table { width: 100%; border-collapse: collapse; position: relative; z-index: 2; background: transparent; }
    th { background: rgba(242, 242, 242, 0.9); padding: 8px 2px; font-size: 12px; border-bottom: 2px solid #ddd; }
    td { border-bottom: 1px solid #eee; padding: 4px 1px; text-align: center; }
    input.grid-input { width: 92%; padding: 10px 2px; border: 1px solid #ddd; border-radius: 6px; text-align: center; font-size: 16px; font-weight: bold; background: rgba(255, 255, 255, 0.5); line-height: 1.4; }
    .row-controls { display: flex; justify-content: space-between; padding: 10px; }
    .btn-row { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 24px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
    .btn-add { background: #1b5e20; }
    .btn-remove { background: #d32f2f; }

    .charge-selector-box { padding: 10px; text-align: center; background: #fff9c4; border-bottom: 1px solid #fbc02d; }
    .charge-select { padding: 8px; border-radius: 8px; border: 2px solid #b31d1d; font-weight: bold; font-size: 14px; background: white; cursor: pointer; outline: none; }

    .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 8px; border-radius: 8px; border: 1px solid #eee; background: rgba(255, 255, 255, 0.9); }
    .summary-row span { font-weight: bold; font-size: 12px; display: inline-flex; align-items: center; white-space: nowrap; } 
    .highlight-green { background: rgba(232, 245, 233, 0.9); color: #2e7d32; border-color: #c8e6c9; }
    .highlight-red { background: rgba(255, 235, 238, 0.9); color: #c62828 !important; border-color: #ffcdd2; }
    .highlight-red input { color: #c62828 !important; display: inline-block; vertical-align: middle; margin: 0 2px; }
    .highlight-blue { background: rgba(227, 242, 253, 0.9); color: #1565c0; border-color: #bbdefb; }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
    .btn { border: none; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-share { background: #1565c0; grid-column: span 2; position: relative; }
    .btn-jpg { background: #f57c00; }
    .btn-pdf { background: #d32f2f; }
    .btn-print { background: #455a64; grid-column: span 2; }
    .share-options { display: none; position: absolute; bottom: 100%; left: 0; width: 100%; background: white; border: 1px solid #ddd; border-radius: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); margin-bottom: 5px; z-index: 100; overflow: hidden; }
    .share-opt-btn { padding: 12px; width: 100%; border: none; background: white; color: #333; font-weight: bold; cursor: pointer; border-bottom: 1px solid #eee; }
    .developer { text-align: center; padding: 10px; font-size: 11px; color: #999; border-top: 1px solid #eee; }
    #ccr_text, #brp_text { color: #c62828; font-weight: bold; display: none; }
</style>
</head>
<body onload="initApp()">

<div class="lang-switcher" id="langSwitchArea">
    <button class="lang-btn" id="btn-en" onclick="changeLang('en')">English</button>
    <button class="lang-btn" id="btn-hi" onclick="changeLang('hi')">हिन्दी</button>
    <button class="lang-btn" id="btn-gu" onclick="changeLang('gu')">ગુજરાતી</button>
</div>

<div class="app-container" id="reportArea">
    
    <div class="charge-selector-box">
        <select id="chargeCalcMode" class="charge-select" onchange="calc()">
            <option value="crate">ચાર્જ: પ્રતિ કેરેટ</option>
            <option value="weight">ચાર્જ: પ્રતિ ૨૦ કિલો</option>
        </select>
    </div>

    <div class="market-section">
        <div class="input-group">
            <label id="lblDate">Date:</label>
            <input type="date" id="dateInput">
            <div id="formattedDateDisplay"></div>
        </div>
        <div class="input-group">
            <label id="lblFarmer">Farmer Name:</label>
            <textarea id="farmerName" rows="1" placeholder="Farmer Name..."></textarea>
        </div>
        <div class="input-group">
            <label id="lblMarket">Market:</label>
            <textarea id="marketName" rows="1" placeholder="Market Name..."></textarea>
        </div>
    </div>

    <div class="main-content">
        <div class="table-section">
            <div class="watermark-box">
                <div class="watermark-text">KHUSHAL</div>
                <div class="watermark-text">BHAVANI</div>
            </div>
            <table>
                <thead><tr id="tableHead"><th>No.</th><th>Crate</th><th>Weight</th><th>20kg Rate</th><th>1kg Rate</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div class="row-controls" id="rowControls">
                <button class="btn-row btn-add" onclick="addRow()">+</button>
                <button class="btn-row btn-remove" onclick="removeRow()">-</button>
            </div>
        </div>

        <div class="summary-section">
            <div class="summary-row highlight-blue"><span id="lblTotalCrates">Total Crate: <span id="total_crates">0</span></span><span id="lblTotalWeight">Weight: <span id="tw">0</span></span></div>
            
            <div class="summary-row highlight-red">
                <span id="lblCrateCharge" style="flex: 1;">Crate Charge (₹<input id="ccr" value="15" style="width:25px; border:none; background:transparent; font-weight:bold; color: #c62828; padding:0; margin:0;" oninput="calc()"><span id="ccr_text">15</span>)</span>
                <span id="total_cc">0</span>
            </div>
            
            <div class="summary-row highlight-red">
                <span id="lblBrokerage" style="flex: 1;">Commission (<input id="brp" value="3" style="width:18px; border:none; background:transparent; font-weight:bold; text-align:right; color: #c62828; padding:0; margin:0;" oninput="calc()"><span id="brp_text">3</span>%)</span>
                <span id="total_br">0</span>
            </div>

            <div class="summary-row highlight-red"><span id="lblTotalExp">Total Exp:</span><span id="total_exp">0</span></div>
            <div class="summary-row highlight-green"><span>G. Avg: <span id="gross_avg">0</span></span><span>N. Avg: <span id="net_avg">0</span></span></div>
            <div class="summary-row highlight-green"><span id="lblGross">Gross Amt:</span><span id="gt">0</span></div>
            <div class="summary-row highlight-green" style="border: 2px solid #2e7d32;"><span id="lblNet">Net Amt:</span><span id="net" style="font-size: 18px;">0</span></div>
            
            <div id="actionButtons">
                <div class="btn-grid">
                    <button class="btn btn-jpg" onclick="downloadJPG()">JPG</button>
                    <button class="btn btn-pdf" onclick="downloadPDF()">PDF</button>
                    <div class="btn-share" style="grid-column: span 2;">
                        <button class="btn btn-share" style="width:100%" onclick="toggleShare()">Share <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg></button>
                        <div class="share-options" id="shareMenu">
                            <button class="share-opt-btn" onclick="shareFile('jpg')">Share as JPG</button>
                            <button class="share-opt-btn" onclick="shareFile('pdf')">Share as PDF</button>
                        </div>
                    </div>
                    <button class="btn btn-print" id="btnPrint" onclick="printBill()">Print</button>
                </div>
            </div>
        </div>
    </div>
    <div class="developer">Developed by: Khushal Bhavani</div>
</div>

<script>
let currentLang = 'en';
const labels = {
    gu: { date: "તારીખ:", farmer: "ખેડૂતનું નામ:", market: "માર્કેટ:", head: "<th>નં.</th><th>કેરેટ</th><th>વજન</th><th>20kg ભાવ</th><th>1kg ભાવ</th>", crates: "કુલ કેરેટ: ", weight: "વજન: ", ccharge: "કેરેટ ચાર્જ", bro: "કમિશન", texp: "કુલ ખર્ચ:", gross: "ગ્રોસ રકમ:", net: "નેટ રકમ:", prnt: "Print", ph_m: "માર્કેટનું નામ...", ph_f: "ખેડૂતનું નામ...", mode1: "ચાર્જ: પ્રતિ કેરેટ", mode2: "ચાર્જ: પ્રતિ ૨૦ કિલો" },
    hi: { date: "दिनांक:", farmer: "किसान का नाम:", market: "मार्केट:", head: "<th>क्र.</th><th>कैरेट</th><th>वजन</th><th>20kg भाव</th><th>1kg भाव</th>", crates: "कुल कैरेट: ", weight: "वजन: ", ccharge: "कैरेट चार्ज", bro: "कमीशन", texp: "कुल खर्च:", gross: "कुल राशि:", net: "नेट राशि:", prnt: "Print", ph_m: "मार्केट का नाम...", ph_f: "किसान का नाम...", mode1: "शुल्क: प्रति कैरेट", mode2: "शुल्क: प्रति ૨૦ किलो" },
    en: { date: "Date:", farmer: "Farmer Name:", market: "Market:", head: "<th>No.</th><th>Crate</th><th>Weight</th><th>20kg Rate</th><th>1kg Rate</th>", crates: "Total Crate: ", weight: "Weight: ", ccharge: "Crate Charge", bro: "Commission", texp: "Total Exp:", gross: "Gross Amt:", net: "Net Amt:", prnt: "Print", ph_m: "Market Name...", ph_f: "Farmer Name...", mode1: "Charge: Per Crate", mode2: "Charge: Per 20kg" }
};

function initApp() {
    const savedLang = localStorage.getItem('userLanguage') || 'en';
    changeLang(savedLang);
}

function changeLang(lang) {
    currentLang = lang;
    localStorage.setItem('userLanguage', lang);
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + lang).classList.add('active');
    document.getElementById('lblDate').innerText = labels[lang].date;
    document.getElementById('lblFarmer').innerText = labels[lang].farmer;
    document.getElementById('lblMarket').innerText = labels[lang].market;
    document.getElementById('marketName').placeholder = labels[lang].ph_m;
    document.getElementById('farmerName').placeholder = labels[lang].ph_f;
    document.getElementById('tableHead').innerHTML = labels[lang].head;
    document.getElementById('lblTotalCrates').firstChild.textContent = labels[lang].crates;
    document.getElementById('lblTotalWeight').firstChild.textContent = labels[lang].weight;
    document.getElementById('lblCrateCharge').firstChild.textContent = labels[lang].ccharge + " (₹";
    document.getElementById('lblBrokerage').firstChild.textContent = labels[lang].bro + " (";
    document.getElementById('lblTotalExp').innerText = labels[lang].texp;
    document.getElementById('lblGross').innerText = labels[lang].gross;
    document.getElementById('lblNet').innerText = labels[lang].net;
    document.getElementById('btnPrint').innerText = labels[lang].prnt;

    const modeSelect = document.getElementById('chargeCalcMode');
    modeSelect.options[0].text = labels[lang].mode1;
    modeSelect.options[1].text = labels[lang].mode2;
}

let rowCount = 0;
const tbody = document.getElementById('tableBody');
for(let i=0; i<5; i++) addRow();

function addRow() {
    rowCount++;
    let tr = document.createElement('tr');
    tr.id = `row_${rowCount}`;
    tr.innerHTML = `<td>${rowCount}</td><td><input class="grid-input" id="c${rowCount}" type="number" oninput="calc()"></td><td><input class="grid-input" id="w${rowCount}" type="number" oninput="calc()"></td><td><input class="grid-input" id="r20_${rowCount}" type="number" oninput="updatePrice(${rowCount}, '20')"></td><td><input class="grid-input" id="r1_${rowCount}" type="number" oninput="updatePrice(${rowCount}, '1')"></td>`;
    tbody.appendChild(tr);
}

function removeRow() { if(rowCount > 5) { document.getElementById(`row_${rowCount}`).remove(); rowCount--; calc(); } }

function updatePrice(id, type) {
    let r20 = document.getElementById("r20_" + id), r1 = document.getElementById("r1_" + id);
    if (type === '20') r1.value = r20.value ? (r20.value / 20).toFixed(2) : "";
    else r20.value = r1.value ? (r1.value * 20).toFixed(2) : "";
    calc();
}

function calc(){
    let tw=0, gt=0, tc=0;
    for(let g=1; g<=rowCount; g++){
        let c = +document.getElementById("c"+g).value || 0, w = +document.getElementById("w"+g).value || 0, r1 = +document.getElementById("r1_"+g).value || 0;
        if(w > 0){ gt += (r1 * w); tw += w; tc += c; }
    }

    const calcMode = document.getElementById('chargeCalcMode').value;
    const ratePerUnit = (+document.getElementById("ccr").value || 0);
    
    let cc = 0;
    if(calcMode === 'crate') {
        cc = tc * ratePerUnit; // Per Crate
    } else {
        cc = (tw / 20) * ratePerUnit; // Per 20kg
    }

    let br = gt * (+document.getElementById("brp").value || 0) / 100, net = gt - (cc + br);
    document.getElementById("total_cc").innerText = cc.toFixed(2);
    document.getElementById("total_br").innerText = br.toFixed(2);
    document.getElementById("total_exp").innerText = (cc + br).toFixed(2);
    document.getElementById("total_crates").innerText = tc;
    document.getElementById("tw").innerText = tw.toFixed(2);
    document.getElementById("gt").innerText = Math.round(gt);
    document.getElementById("net").innerText = Math.round(net);
    document.getElementById("gross_avg").innerText = tw > 0 ? (gt / tw).toFixed(2) : "0";
    document.getElementById("net_avg").innerText = tw > 0 ? (net / tw).toFixed(2) : "0";
}

function toggleShare() {
    const menu = document.getElementById("shareMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

window.onclick = function(event) { if (!event.target.closest('.btn-share')) { document.getElementById("shareMenu").style.display = "none"; } }

async function prepareForCapture() {
    const dIn = document.getElementById("dateInput"), dDis = document.getElementById("formattedDateDisplay"), rCon = document.getElementById("rowControls"), container = document.getElementById("reportArea");
    const cIn = document.getElementById("ccr"), cTx = document.getElementById("ccr_text");
    const bIn = document.getElementById("brp"), bTx = document.getElementById("brp_text");
    cTx.innerText = cIn.value; bTx.innerText = bIn.value;
    cIn.style.display = "none"; cTx.style.display = "inline";
    bIn.style.display = "none"; bTx.style.display = "inline";

    if(dIn.value) { 
        let d = new Date(dIn.value); 
        dDis.innerText = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
        dIn.style.display = "none"; dDis.style.display = "block"; 
    }
    document.getElementById("actionButtons").style.display = "none"; rCon.style.display = "none"; container.classList.add("download-mode");
    return { dIn, dDis, rCon, container, cIn, cTx, bIn, bTx };
}

function revertCapture(ui) {
    ui.container.classList.remove("download-mode"); document.getElementById("actionButtons").style.display = "block"; ui.rCon.style.display = "flex";
    ui.dIn.style.display = "block"; ui.dDis.style.display = "none";
    ui.cIn.style.display = "inline-block"; ui.cTx.style.display = "none";
    ui.bIn.style.display = "inline-block"; ui.bTx.style.display = "none";
}

async function downloadJPG() {
    const ui = await prepareForCapture();
    const canvas = await html2canvas(ui.container, { scale: 4, useCORS: true, backgroundColor: "#ffffff" });
    const link = document.createElement('a');
    link.download = `Bill.jpg`; link.href = canvas.toDataURL("image/jpeg", 1.0); link.click();
    revertCapture(ui);
}

async function downloadPDF() {
    const ui = await prepareForCapture();
    const canvas = await html2canvas(ui.container, { scale: 4, useCORS: true, backgroundColor: "#ffffff" });
    const imgData = canvas.toDataURL("image/jpeg", 1.0);
    const { jsPDF } = window.jspdf; 
    const pdfWidth = canvas.width * 0.2645;
    const pdfHeight = canvas.height * 0.2645;
    const pdf = new jsPDF(pdfWidth > pdfHeight ? 'l' : 'p', 'mm', [pdfWidth, pdfHeight]);
    pdf.addImage(imgData, 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
    pdf.save("Bill.pdf");
    revertCapture(ui);
}

async function shareFile(type) {
    const ui = await prepareForCapture();
    const canvas = await html2canvas(ui.container, { scale: 4, useCORS: true, backgroundColor: "#ffffff" });
    try {
        if (type === 'jpg') {
            const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", 1.0));
            const file = new File([blob], "Bill.jpg", { type: "image/jpeg" });
            if (navigator.share) { await navigator.share({ files: [file], title: 'Bill' }); } 
            else { alert("Sharing not supported."); }
        } else {
            const { jsPDF } = window.jspdf;
            const pdfWidth = canvas.width * 0.2645;
            const pdfHeight = canvas.height * 0.2645;
            const pdf = new jsPDF(pdfWidth > pdfHeight ? 'l' : 'p', 'mm', [pdfWidth, pdfHeight]);
            pdf.addImage(canvas.toDataURL("image/jpeg", 1.0), 'JPEG', 0, 0, pdf.internal.pageSize.getWidth(), pdf.internal.pageSize.getHeight());
            const pdfBlob = pdf.output('blob');
            const file = new File([pdfBlob], "Bill.pdf", { type: "application/pdf" });
            if (navigator.share) { await navigator.share({ files: [file], title: 'Bill PDF' }); }
            else { alert("Sharing not supported."); }
        }
    } catch (err) { console.log(err); }
    revertCapture(ui);
}

function printBill() {
    const dIn = document.getElementById("dateInput"), dDis = document.getElementById("formattedDateDisplay");
    if(dIn.value) { 
        let d = new Date(dIn.value); 
        dDis.innerText = `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
        dIn.style.display = "none"; dDis.style.display = "block"; 
    }
    window.print();
    dIn.style.display = "block"; dDis.style.display = "none";
}
</script>
</body>
</html>
